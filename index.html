<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Whereby Custom Video Call</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    .call-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>

<h2 style="color:white; text-align:center;">TESTE WEBCAM</h2>

           <div class="call-wrap">
            <iframe
              src="https://whereby.com/teste-para-2"
              allow="camera; microphone; fullscreen" 
              disablepictureinpicture
              style="width:100%; height:600px; border:0;">                
            </iframe>              
          </div>

</body>
</html>
