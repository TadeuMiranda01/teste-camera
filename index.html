<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Whereby Custom Video Call</title>
  <style>
    /* Faz o vídeo ocupar toda a área disponível */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    .call-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="call-wrap">
    <!-- 
      ATRIBUTOS CRÍTICOS ABAIXO:
      1. playsinline: Impede o iPhone de abrir o player nativo (tela cheia/pip).
      2. disablepictureinpicture: Remove o botão de destaque do navegador.
      3. URL ?embed=true&pip=off: Remove controles internos do Whereby.
    -->
    <iframe
      src="https://whereby.com/teste-para-2"
      allow="camera; microphone; fullscreen; display-capture"
      playsinline
      webkit-playsinline
      disablepictureinpicture
      disableremoteplayback
    ></iframe>
  </div>

</body>
</html>
